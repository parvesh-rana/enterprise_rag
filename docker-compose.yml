services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-rag-api:dev
    container_name: enterprise-rag-api
    restart: unless-stopped
    env_file: .env
    environment:
      CHROMA_PERSIST_DIR: /app/data/chroma
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
