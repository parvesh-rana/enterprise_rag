services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: enterprise-rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-rag-api:dev
    container_name: enterprise-rag-api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Mount built indexes / chunks read-only at runtime.
      - ./data:/app/data:ro

volumes:
  qdrant_storage:
