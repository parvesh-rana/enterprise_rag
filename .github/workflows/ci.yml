name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Tests don't make outbound LLM calls, but pydantic-settings still needs
      # the env present. CI ships with stub values; real keys live only in .env.
      NVIDIA_API_KEY: "ci-stub"
      EDGAR_USER_AGENT: "Enterprise RAG CI ci@example.com"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --frozen || uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Black --check
        run: uv run black --check .

      - name: Mypy (strict on api + retrieval; loose elsewhere)
        run: uv run mypy api retrieval generation core ingestion index evaluation

      - name: Pytest
        run: uv run pytest --cov=api --cov=retrieval --cov=generation --cov-report=xml -q

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore
